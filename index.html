<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 設定密碼畫面的樣子：黑底白字，置中 */
      #lock-screen {
        position: absolute; z-index: 999; top:0; left:0; width: 100%; height: 100%;
        background: #222; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: sans-serif;
      }
      input, button { padding: 10px 20px; font-size: 16px; margin: 10px; border-radius: 5px; border: none; }
      button { background: #ff4757; color: white; cursor: pointer; }
    </style>
  </head>
  
  <body>

    <div id="lock-screen">
      <h2>✨ 請輸入聽見魔法的咒語 ✨</h2>
      <input type="text" id="magic-word" placeholder="請輸入密碼...">
      <button onclick="unlockAR()">施展魔法</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model id="my-avatar" rotation="0 0 0" position="0 0 0" scale="0.05 0.05 0.05" src="./avatar.glb"></a-gltf-model>
        <a-entity id="my-sound" sound="src: ./card-music.mp3"></a-entity>
      </a-entity>
    </a-scene>

    <script>
      // 點擊按鈕後的魔法邏輯
      function unlockAR() {
        var answer = document.getElementById("magic-word").value;
        
        if (answer === "1234") { // 👈 這裡可以改成你想要的密碼關鍵字！
          // 密碼正確：把黑色密碼畫面丟掉
          document.getElementById("lock-screen").style.display = "none";
          
          // 設定當相機「看到卡片」時，自動播放音樂
          var cardTarget = document.querySelector('[mindar-image-target]');
cardTarget.addEventListener("targetFound", function() {
    // 在畫面上顯示一個提示，請使用者點一下
    var hint = document.createElement("div");
    hint.id = "tap-hint";
    hint.style = "position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:white;padding:12px 24px;border-radius:20px;font-size:16px;z-index:999;";
    hint.innerText = "👆 點擊畫面播放聲音";
    document.body.appendChild(hint);

    document.body.addEventListener("click", function playOnce() {
        document.getElementById('my-sound').components.sound.playSound();
        // 點一次後移除提示和監聽器
        hint.remove();
        document.body.removeEventListener("click", playOnce);
    }, { once: true });
});
        } else {
          alert("❌ 咒語錯誤！再試一次！");
        }
      }
    </script>
  </body>
</html>
