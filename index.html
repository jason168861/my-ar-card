<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body, a-scene {
        width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
      }
      #lock-screen {
        position: absolute; z-index: 999; top:0; left:0; width: 100%; height: 100%;
        background: #222; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: sans-serif;
      }
      input, button { padding: 10px 20px; font-size: 16px; margin: 10px; border-radius: 5px; border: none; }
      button { background: #ff4757; color: white; cursor: pointer; }
    </style>
  </head>
  
  <body>

    <div id="lock-screen">
      <h2>✨ 請輸入星際聯邦認證碼 ✨</h2>
      <input type="text" id="magic-word" placeholder="請輸入認證碼...">
      <button onclick="unlockAR()">開啟機密檔案</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model id="my-avatar" rotation="0 0 0" position="0 0 0" scale="0.05 0.05 0.05" src="./avatar.glb"></a-gltf-model>
        <a-entity id="my-sound" sound="src: ./card-music.mp3"></a-entity>
      </a-entity>
    </a-scene>

    <script>
      function unlockAR() {
        var answer = document.getElementById("magic-word").value;
        
        if (answer === "Eliot") {
          // 密碼正確，隱藏黑畫面
          document.getElementById("lock-screen").style.display = "none";
          
          // 【核心修正】強迫手動啟動 AR 引擎與相機
          const sceneEl = document.querySelector('a-scene');
          const arSystem = sceneEl.systems["mindar-image-system"];
          
          alert("📡 密碼正確！正在嘗試啟動手機相機...");
          
          arSystem.start().then(() => {
            alert("✅ 相機啟動成功！請對準卡片！");
          }).catch((err) => {
            // 如果相機壞掉或被封鎖，會跳出這個警告
            alert("❌ 相機啟動失敗，錯誤原因: " + err);
          });
          
          // 設定辨識到卡片時播音樂
          var cardTarget = document.querySelector('[mindar-image-target]');
          cardTarget.addEventListener("targetFound", function() {
            document.getElementById('my-sound').components.sound.playSound();
          });
          
        } else {
          alert("❌ 認證碼錯誤！再試一次！");
        }
      }
    </script>
  </body>
</html>
